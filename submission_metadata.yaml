ai_usage_summary: |
  Used Claude Antigravity for code generation and architectural design.
  No candidate data was fed to any LLM during ranking.
  All scoring is deterministic rule-based logic executed locally.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based deterministic ranker with explicit reasoning capture.
  Five weighted scoring components: (1) AI/ML Core Skills Match (40%) —
  matches skills against a curated 100+ term AI/ML taxonomy with proficiency
  and endorsement quality gates to catch keyword stuffers; (2) Title & Career
  Trajectory (25%) — tiered lookup of current and past job titles with ML
  keyword detection in role descriptions; (3) Years of Experience (15%) —
  soft optimum at 3-8 years with smooth decay outside; (4) Availability &
  Logistics (10%) — open-to-work flag, notice period, relocation willingness,
  work mode; (5) Education (10%) — institution tier, degree level, field
  relevance. A multiplicative Behavioral Modifier (x0.85-x1.15) adjusts the
  final score using platform signals: profile completeness, recruiter response
  rate, GitHub activity, interview completion rate, and recency.
  Runtime: ~90 seconds for 100K candidates on CPU, <1 GB RAM.

