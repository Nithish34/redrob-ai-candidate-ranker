name: Sync to Hugging Face Spaces
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify Required Space Files
        run: |
          test -f app.py
          test -f scorer.py
          test -f rank.py
          test -f submission.csv
          test -f sample_candidates.json

      - name: Run Regression Tests
        run: |
          python -m py_compile app.py scorer.py rank.py inspect_submission.py
          python -m unittest discover -v
          python inspect_submission.py submission.csv

      - name: Smoke Test — Full Ranking Pipeline
        run: |
          python -c "
          from pathlib import Path
          from scorer import score_from_json_bytes, DEFAULT_SCORING_DATE

          sample = Path('sample_candidates.json')
          assert sample.exists(), 'sample_candidates.json is missing from the repo'
          results = score_from_json_bytes(sample.read_bytes(), scoring_date=DEFAULT_SCORING_DATE)
          assert len(results) > 0, 'Scoring returned no results'
          scores = [r['score'] for r in results]
          assert all(a >= b for a, b in zip(scores, scores[1:])), \
              'Scores are not sorted descending'
          print('Pipeline smoke test PASSED:', len(results), 'candidates ranked,',
                'top score=', round(results[0]['score'], 4))
          "
          python -c "
          import app
          assert app.PREBUILT_SUBMISSION.exists(), \
              'submission.csv not found at ' + str(app.PREBUILT_SUBMISSION)
          print('submission.csv present - Live Preview tab will work')
          "

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git checkout --orphan hf-sync
          git rm -rf .
          git checkout $GITHUB_SHA -- .
          find . -name "*.docx" -delete
          git add .
          git commit -m "Sync to HF Space"
          git push --force https://voldigo:$HF_TOKEN@huggingface.co/spaces/voldigo/redrob-ai-candidate-ranker hf-sync:main
